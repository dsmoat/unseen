name = "unseen-demo"
main = "worker/index.ts"
compatibility_date = "2024-12-01"
assets = { directory = "./dist", binding = "ASSETS" }

# Add generated IDs in the Cloudflare dashboard, not source control.
[[d1_databases]]
binding = "DB"
database_name = "unseen-demo"
database_id = "f2c76797-017e-41cc-9e27-3987a3e4eb3e"

[ai]
binding = "AI"

[vars]
UNSEEN_MODE = "deterministic"
AI_MODEL = "@cf/openai/gpt-oss-120b"
